<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنت غير متصل - iDara</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0a4f14 0%, #1D9E75 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .offline-container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.05);
            }
        }

        h1 {
            color: #0a4f14;
            font-size: 28px;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .offline-message {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .offline-tips {
            background: #f0fdf4;
            border: 1px solid #b7e4c7;
            border-radius: 12px;
            padding: 18px;
            text-align: right;
            margin-bottom: 30px;
        }

        .offline-tips h3 {
            color: #0a4f14;
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .offline-tips ul {
            list-style: none;
            text-align: right;
            font-size: 13px;
            color: #555;
        }

        .offline-tips li {
            margin-bottom: 8px;
            padding-right: 20px;
            position: relative;
        }

        .offline-tips li::before {
            content: "✓";
            position: absolute;
            right: 0;
            color: #1D9E75;
            font-weight: 700;
        }

        .offline-actions {
            display: flex;
            gap: 10px;
            flex-direction: column;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Tajawal', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0a4f14 0%, #1D9E75 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(26, 158, 117, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: #0a4f14;
            border: 1.5px solid #0a4f14;
        }

        .btn-secondary:hover {
            background: #f0fdf4;
        }

        .offline-status {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
            color: #999;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #fff5f5;
            border-radius: 8px;
            color: #ba1a1a;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ba1a1a;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        @media (max-width: 480px) {
            .offline-container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .offline-icon {
                font-size: 60px;
            }

            .offline-message {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        
        <h1>أنت غير متصل بالانترنت</h1>
        
        <p class="offline-message">
            يبدو أن اتصالك بالانترنت معطل. بعض الميزات قد لا تكون متاحة، لكن يمكنك:
        </p>

        <div class="offline-tips">
            <h3>ماذا يمكنك أن تفعل؟</h3>
            <ul>
                <li>عرض الصفحات المحفوظة مسبقاً</li>
                <li>مراجعة البيانات المخزنة محلياً</li>
                <li>الانتظار حتى يعود الاتصال</li>
            </ul>
        </div>

        <div class="offline-actions">
            <button class="btn btn-primary" onclick="goHome()">
                العودة إلى الرئيسية
            </button>
            <button class="btn btn-secondary" onclick="reloadPage()">
                إعادة المحاولة
            </button>
        </div>

        <div class="offline-status">
            <div class="status-indicator">
                <span class="status-dot"></span>
                <span>الاتصال معطل</span>
            </div>
        </div>
    </div>

    <script>
        function goHome() {
            window.location.href = '/';
        }

        function reloadPage() {
            window.location.reload();
        }

        // Monitor connection and reload page when back online
        window.addEventListener('online', () => {
            console.log('[Offline Page] Connection restored!');
            setTimeout(() => {
                window.location.reload();
            }, 1000);
        });
    </script>
</body>
</html>
